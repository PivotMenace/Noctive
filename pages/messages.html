<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noctive | Messages</title>
  <link rel="icon" type="image/png" href="../pngs/Favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;600;700;900&family=Roboto+Condensed:wght@300;400;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #facc15;
      --bgTop: #05040a;
      --bgMid: #060415;
      --panel: rgba(255,255,255,0.055);
      --panel2: rgba(0,0,0,0.26);
      --border: rgba(255,255,255,0.09);
      --text: rgba(255,255,255,0.93);
      --muted: rgba(255,255,255,0.66);
      --accent: #dc143c;
      --fontMain: 'Nunito', sans-serif;
      --fontHead: 'Rubik', 'Roboto Condensed', 'Nunito', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--fontMain);
      color: var(--text);
      min-height: 100vh;
      background: linear-gradient(135deg, #181624, #1e1a2f, #23244a, #23244a, #181624);
      background-size: 200% 200%;
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-color: #121524;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 6000;
      backdrop-filter: blur(10px);
      background: rgba(10,10,14,0.60);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 14px 18px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 12px;
    }
    .brand-link { grid-column: 1; }
    .brand-title {
      display: inline-block;
      font-size: 2rem;
      font-weight: 700;
      font-family: var(--fontHead);
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #8b0000, #b22222, #dc143c, #b22222, #8b0000);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% 200%;
      line-height: 1;
      filter: drop-shadow(0 1px 3px rgba(139,0,0,0.4));
    }
    .topnav {
      grid-column: 2;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      width: max-content;
      max-width: 100%;
      justify-self: start;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .topnav::-webkit-scrollbar { display: none; }
    .topnav a {
      font-family: var(--fontHead);
      color: rgba(255,255,255,0.80);
      font-size: 0.92rem;
      padding: 10px 12px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .topnav a:hover,
    .topnav a[aria-current="page"] {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    .topbar-right {
      grid-column: 4;
      display: grid;
      align-items: center;
      gap: 8px;
      justify-items: end;
    }
    .ghost-btn {
      font-family: var(--fontHead);
      color: rgba(255,255,255,0.84);
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .ghost-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

    .messages-shell {
      max-width: 1280px;
      margin: 0 auto;
      height: calc(100vh - 76px);
      display: grid;
      grid-template-columns: 300px 1fr;
      overflow: hidden;
      border-top: 1px solid var(--border);
    }
    .sidebar {
      background: linear-gradient(180deg, rgba(20,16,32,0.95), rgba(15,13,24,0.98));
      border-right: 1px solid var(--border);
      padding: 16px 10px;
      overflow-y: auto;
    }
    .sidebar-title {
      font-size: 0.8rem;
      font-family: var(--fontHead);
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 4px 12px 10px;
    }
    .new-message-btn {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(255,140,102,0.90), rgba(159,140,255,0.90));
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      font-family: var(--fontHead);
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .new-message-btn:hover { transform: translateY(-1px); }
    .conversation-item {
      padding: 12px 14px;
      margin-bottom: 6px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }
    .conversation-item:hover { background: rgba(255,255,255,0.08); }
    .conversation-item.active { background: linear-gradient(90deg, rgba(255,140,102,0.20), rgba(159,140,255,0.20)); border: 1px solid rgba(159,140,255,0.30); }
    .conversation-avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: var(--fontHead); flex-shrink: 0; border: 1px solid rgba(255,255,255,0.12); }
    .conversation-info { min-width: 0; flex: 1; }
    .conversation-name { font-size: 0.95rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conversation-preview { font-size: 0.8rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .chat-area { display: grid; grid-template-rows: 64px 1fr auto; background: linear-gradient(135deg, rgba(20,22,33,0.60), rgba(16,18,28,0.70)); min-height: 0; }
    .chat-header { padding: 0 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .chat-header-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .chat-header-avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: var(--fontHead); border: 1px solid rgba(255,255,255,0.12); flex-shrink: 0; }
    .chat-header-info h3 { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 2px; }
    .chat-header-info p { font-size: 0.8rem; color: var(--muted); }
    .messages-box { overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); text-align: center; }
    .message-group { display: flex; gap: 12px; align-items: flex-start; }
    .message-avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; font-weight: 700; font-family: var(--fontHead); font-size: 0.85rem; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.12); }
    .message-content { flex: 1; min-width: 0; }
    .message-header { display: flex; gap: 8px; align-items: baseline; margin-bottom: 4px; }
    .message-author { font-weight: 700; color: #fff; font-size: 0.95rem; }
    .message-timestamp { font-size: 0.75rem; color: var(--muted); }
    .message-bubble { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 10px 14px; max-width: 85%; word-wrap: break-word; line-height: 1.5; color: rgba(245,247,255,0.92); }
    .message-group.own .message-bubble { background: linear-gradient(135deg, rgba(255,140,102,0.20), rgba(159,140,255,0.20)); border-color: rgba(159,140,255,0.30); margin-left: auto; max-width: 85%; }
    .message-group.own { flex-direction: row-reverse; }
    .message-input-area { padding: 16px 24px 20px; border-top: 1px solid var(--border); background: rgba(16,18,26,0.60); }
    .message-input-wrapper { display: flex; gap: 12px; align-items: flex-end; }
    .input-field { flex: 1; display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 12px; background: rgba(32,34,38,0.88); border: 1px solid rgba(255,255,255,0.08); }
    .input-field:focus-within { border-color: rgba(159,140,255,0.40); background: rgba(32,34,38,0.95); }
    .message-textarea { flex: 1; border: 0; background: transparent; color: #fff; outline: 0; resize: none; max-height: 120px; font-family: var(--fontMain); font-size: 0.95rem; }
    .message-textarea::placeholder { color: rgba(255,255,255,0.40); }
    .send-btn { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, rgba(255,140,102,0.90), rgba(159,140,255,0.90)); border: 1px solid rgba(255,255,255,0.12); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .send-btn:hover:not(:disabled) { transform: translateY(-1px); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.60); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-box { background: rgba(20,16,32,0.95); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 92%; max-width: 440px; }
    .modal-box h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; color: #fff; }
    .modal-box input { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.06); color: #fff; font-family: var(--fontMain); margin-bottom: 12px; }
    .modal-box input::placeholder { color: rgba(255,255,255,0.40); }
    .modal-buttons { display: flex; gap: 10px; }
    .modal-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.06); color: #fff; cursor: pointer; }
    .modal-btn:hover { background: rgba(255,255,255,0.12); }
    .modal-btn.primary { background: linear-gradient(135deg, rgba(255,140,102,0.90), rgba(159,140,255,0.90)); border: none; font-weight: 700; }
    .suggestion-item { display:flex; gap:10px; align-items:center; padding:8px 10px; border-radius:8px; cursor:pointer; }
    .suggestion-item:hover { background: rgba(255,255,255,0.04); }

    @media (max-width: 900px) {
      .messages-shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand-link" href="./home.html">
        <span class="brand-title">Noctive</span>
      </a>
      <nav class="topnav" aria-label="Primary">
        <a href="./home.html">Home</a>
        <a href="./explore.html">Explore</a>
        <a href="./faq.html">FAQ</a>
        <a href="./messages.html" aria-current="page">Messages</a>
        <a href="./store.html">Night Market</a>
        <a href="./profile.html">Profile</a>
      </nav>
      <div class="topbar-right">
        <a class="ghost-btn" href="./notifications.html" title="Notifications">☼</a>
      </div>
    </div>
  </header>

  <div class="messages-shell">
    <div class="sidebar">
      <button class="new-message-btn" type="button">+ New Message</button>
      <div class="sidebar-title">Direct Messages</div>
      <div id="conversations-list"></div>
    </div>
    <div class="chat-area">
      <div class="chat-header">
        <div class="chat-header-left">
          <div class="chat-header-avatar" id="selectedAvatar">💬</div>
          <div class="chat-header-info">
            <h3 id="selectedName">Select a conversation</h3>
            <p id="selectedStatus">Choose from your direct messages</p>
          </div>
        </div>
      </div>
      <div class="messages-box" id="messagesBox">
        <div class="empty-state"><div style="font-size:3rem;margin-bottom:12px">💬</div><p>Select a conversation to start messaging</p></div>
      </div>
      <div class="message-input-area">
        <div class="message-input-wrapper">
          <div class="input-field">
            <textarea class="message-textarea" id="messageInput" placeholder="Message..." disabled rows="1"></textarea>
          </div>
          <button class="send-btn" id="sendBtn" disabled title="Send">➤</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from "../js/firebase.js";
    import { collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where, updateDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const auth = getAuth();
    let currentUser = null;
    let currentConversation = null;
    let messageUnsubscribe = null;
    let conversationUnsubscribe = null;

    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const messagesBox = document.getElementById("messagesBox");
    const conversationsList = document.getElementById("conversations-list");
    const selectedName = document.getElementById("selectedName");
    const selectedStatus = document.getElementById("selectedStatus");
    const selectedAvatar = document.getElementById("selectedAvatar");
    const newMessageBtn = document.querySelector(".new-message-btn");
    const pendingThreadUid = new URLSearchParams(window.location.search).get("thread");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login-google.html";
        return;
      }
      currentUser = user;
      initMessaging();
      if (pendingThreadUid) {
        await ensureConversationWithUser(pendingThreadUid);
      }
    });

    function initMessaging() {
      messageInput.disabled = false;
      loadConversations();
      setupEventListeners();
    }

    function setupEventListeners() {
      sendBtn.addEventListener("click", sendMessage);
      messageInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
      messageInput.addEventListener("input", () => {
        sendBtn.disabled = !messageInput.value.trim();
        autoResize();
      });
      newMessageBtn.addEventListener("click", showNewMessageModal);
    }

    function loadConversations() {
      if (conversationUnsubscribe) conversationUnsubscribe();
      const q = query(collection(db, "conversations"), where("participants", "array-contains", currentUser.uid));
      conversationUnsubscribe = onSnapshot(q, (snapshot) => {
        conversationsList.innerHTML = "";
        if (snapshot.empty) {
          conversationsList.innerHTML = '<div style="color: var(--muted); font-size: 0.85rem; padding: 0 12px;">No conversations yet</div>';
          return;
        }
        snapshot.docs.forEach((docSnapshot) => {
          const conv = docSnapshot.data();
          conversationsList.appendChild(createConversationElement(docSnapshot.id, conv));
        });
      });
    }

    function createConversationElement(convId, convData) {
      const div = document.createElement("div");
      div.className = "conversation-item" + (currentConversation === convId ? " active" : "");
      const otherIds = (convData.participants || []).filter((id) => id !== currentUser.uid);
      const displayName = convData.name || otherIds.join(", ") || "Conversation";
      const preview = convData.lastMessage || "No messages yet";
      div.innerHTML = `
        <div class="conversation-avatar">${displayName.charAt(0).toUpperCase()}</div>
        <div class="conversation-info">
          <div class="conversation-name">${escapeHtml(displayName)}</div>
          <div class="conversation-preview">${escapeHtml(preview)}</div>
        </div>`;
      div.addEventListener("click", () => selectConversation(convId, convData));
      return div;
    }

    function selectConversation(convId, convData) {
      document.querySelectorAll(".conversation-item").forEach((el) => el.classList.remove("active"));
      const activeEl = Array.from(document.querySelectorAll(".conversation-item")).find((el) => el.textContent.includes(convId));
      if (activeEl) activeEl.classList.add("active");
      currentConversation = convId;
      const otherIds = (convData.participants || []).filter((id) => id !== currentUser.uid);
      const displayName = convData.name || otherIds.join(", ") || "Conversation";
      selectedName.textContent = displayName;
      selectedStatus.textContent = `${(convData.participants || []).length} participant${(convData.participants || []).length > 1 ? "s" : ""}`;
      selectedAvatar.textContent = displayName.charAt(0).toUpperCase();
      messagesBox.innerHTML = '<div class="empty-state"><p>Loading messages…</p></div>';
      messageInput.disabled = false;
      messageInput.focus();
      loadMessages(convId);
    }

    function loadMessages(convId) {
      if (messageUnsubscribe) messageUnsubscribe();
      const q = query(collection(db, `conversations/${convId}/messages`), orderBy("timestamp", "asc"));
      messageUnsubscribe = onSnapshot(q, (snapshot) => {
        messagesBox.innerHTML = "";
        if (snapshot.empty) {
          messagesBox.innerHTML = '<div class="empty-state"><p>No messages yet. Start the conversation!</p></div>';
          return;
        }
        snapshot.docs.forEach((messageDoc) => {
          const msg = messageDoc.data();
          messagesBox.appendChild(createMessageElement(msg));
        });
        messagesBox.scrollTop = messagesBox.scrollHeight;
      });
    }

    function createMessageElement(msg) {
      const container = document.createElement("div");
      container.className = `message-group ${msg.senderId === currentUser.uid ? "own" : ""}`;
      const time = msg.timestamp?.toDate?.() || new Date();
      const timeString = time.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
      container.innerHTML = `
        <div class="message-avatar">${(msg.senderName || "U").charAt(0).toUpperCase()}</div>
        <div class="message-content">
          <div class="message-header">
            <span class="message-author">${escapeHtml(msg.senderName || "Unknown")}</span>
            <span class="message-timestamp">${timeString}</span>
          </div>
          <div class="message-bubble">${escapeHtml(msg.text)}</div>
        </div>`;
      return container;
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !currentConversation) return;
      sendBtn.disabled = true;
      messageInput.disabled = true;
      try {
        await addDoc(collection(db, `conversations/${currentConversation}/messages`), { senderId: currentUser.uid, senderName: currentUser.displayName || "User", text, timestamp: serverTimestamp() });
        await updateDoc(doc(db, "conversations", currentConversation), { lastMessage: text, lastMessageTime: serverTimestamp() });
        messageInput.value = "";
      } catch (error) {
        console.error(error);
        alert("Failed to send message");
      } finally {
        sendBtn.disabled = false;
        messageInput.disabled = false;
        messageInput.focus();
      }
    }

    function autoResize() {
      messageInput.style.height = "auto";
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + "px";
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    async function ensureConversationWithUser(targetUid) {
      if (!currentUser?.uid || !targetUid || targetUid === currentUser.uid) return;
      const q = query(collection(db, "conversations"), where("participants", "array-contains", currentUser.uid));
      const snapshot = await getDocs(q);
      const existing = snapshot.docs.find((conversationDoc) => {
        const participants = conversationDoc.data().participants || [];
        return participants.includes(targetUid);
      });

      if (existing) {
        selectConversation(existing.id, existing.data());
        return;
      }

      const newDoc = await addDoc(collection(db, "conversations"), {
        participants: [currentUser.uid, targetUid],
        name: null,
        lastMessage: "",
        lastMessageTime: serverTimestamp()
      });
      selectConversation(newDoc.id, { participants: [currentUser.uid, targetUid], name: null, lastMessage: "" });
    }

    function showNewMessageModal() {
      const overlay = document.createElement("div");
      overlay.className = "modal-overlay";
      overlay.innerHTML = `
        <div class="modal-box">
          <h2>Start New Conversation</h2>
          <label style="display:block; font-size:0.9rem; color:var(--muted); margin-bottom:8px;">Suggested following</label>
          <input id="userSearchInput" placeholder="Search following" />
          <div id="userSuggestions" style="max-height:240px; overflow:auto; margin-bottom:12px;"></div>
          <div id="selectedParticipants" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;"></div>
          <div class="modal-buttons">
            <button class="modal-btn" id="cancelNewConv" type="button">Cancel</button>
            <button class="modal-btn primary" id="createConvBtn" type="button">Create Conversation</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);

      const input = overlay.querySelector("#userSearchInput");
      const suggestionsEl = overlay.querySelector("#userSuggestions");
      const selectedEl = overlay.querySelector("#selectedParticipants");
      const cancelBtn = overlay.querySelector("#cancelNewConv");
      const createBtn = overlay.querySelector("#createConvBtn");
      const selected = new Map();

      cancelBtn.addEventListener("click", () => overlay.remove());
      input.focus();
      input.addEventListener("input", async () => {
        const term = input.value.trim().toLowerCase();
        const users = await getFollowingSuggestions(term);
        renderSuggestions(users, suggestionsEl, selected, selectedEl, input);
      });

      createBtn.addEventListener("click", async () => {
        if (!currentUser) return alert("Please sign in");
        const participantUids = Array.from(selected.keys());
        if (!participantUids.length) return alert("Select at least one person");
        if (!participantUids.includes(currentUser.uid)) participantUids.push(currentUser.uid);
        await addDoc(collection(db, "conversations"), { participants: participantUids, name: null, lastMessage: "", lastMessageTime: serverTimestamp() });
        overlay.remove();
      });

      getFollowingSuggestions("").then((users) => renderSuggestions(users, suggestionsEl, selected, selectedEl, input));
    }

    async function getFollowingSuggestions(term = "") {
      const raw = localStorage.getItem(`noctive_following_${currentUser.uid}`);
      const ids = raw ? JSON.parse(raw) : [];
      const uniqueIds = [...new Set(ids.filter(Boolean))];
      if (!uniqueIds.length) return [];
      const snapshot = await getDocs(collection(db, "Profiles"));
      const users = snapshot.docs
        .map((profileDoc) => ({ uid: profileDoc.id, ...profileDoc.data() }))
        .filter((profile) => uniqueIds.includes(profile.uid) || uniqueIds.includes(profile.profileUid) || uniqueIds.includes(profile.id))
        .filter((profile) => {
          if (!term) return true;
          const haystack = `${profile.displayName || ""} ${profile.username || ""}`.toLowerCase();
          return haystack.includes(term);
        })
        .map((profile) => ({ uid: profile.uid || profile.id, displayName: profile.displayName || profile.username || "User", username: profile.username || "" }))
        .slice(0, 30);
      return users;
    }

    function renderSuggestions(users, suggestionsEl, selected, selectedEl, input) {
      suggestionsEl.innerHTML = "";
      if (!users.length) {
        suggestionsEl.innerHTML = '<div style="padding:10px;color:var(--muted)">No following matches yet</div>';
        return;
      }
      users.forEach((user) => {
        const row = document.createElement("div");
        row.className = "suggestion-item";
        row.innerHTML = `
          <div style="width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-weight:700;">${(user.displayName || user.username || "U").charAt(0).toUpperCase()}</div>
          <div style="flex:1; min-width:0">
            <div style="font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escapeHtml(user.displayName || user.username || "User")}</div>
            <div style="font-size:0.85rem;color:var(--muted);">@${escapeHtml(user.username || "")}</div>
          </div>`;
        row.addEventListener("click", () => {
          if (!selected.has(user.uid)) selected.set(user.uid, user);
          renderSelectedTags(selected, selectedEl);
          input.value = "";
          suggestionsEl.innerHTML = "";
        });
        suggestionsEl.appendChild(row);
      });
    }

    function renderSelectedTags(selected, selectedEl) {
      selectedEl.innerHTML = "";
      selected.forEach((user, uid) => {
        const tag = document.createElement("div");
        tag.style.display = "inline-flex";
        tag.style.alignItems = "center";
        tag.style.gap = "8px";
        tag.style.padding = "6px 8px";
        tag.style.borderRadius = "999px";
        tag.style.background = "rgba(255,255,255,0.04)";
        tag.style.border = "1px solid rgba(255,255,255,0.06)";
        tag.innerHTML = `<span style="font-weight:700">${escapeHtml(user.displayName || user.username || "User")}</span>`;
        const removeBtn = document.createElement("button");
        removeBtn.textContent = "×";
        removeBtn.style.border = "0";
        removeBtn.style.background = "transparent";
        removeBtn.style.color = "#fff";
        removeBtn.style.cursor = "pointer";
        removeBtn.addEventListener("click", () => { selected.delete(uid); renderSelectedTags(selected, selectedEl); });
        tag.appendChild(removeBtn);
        selectedEl.appendChild(tag);
      });
    }
  </script>
</body>
</html>
