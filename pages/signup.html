<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noctive | Sign Up</title>
  <link rel="icon" type="image/png" href="../pngs/Favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@700&family=Roboto+Condensed:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0f14;
      --red1: #8b0000;
      --red2: #b22222;
      --red3: #dc143c;
      --white: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.68);
      --good: #19ff9a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(900px 600px at 50% 20%, rgba(220, 20, 60, 0.12), transparent 60%),
        radial-gradient(900px 600px at 50% 85%, rgba(255, 255, 255, 0.06), transparent 60%),
        var(--bg);
      color: var(--white);
      font-family: 'Rubik', system-ui, sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(480px, 100%);
      padding: 28px 22px;
      border-radius: 24px;
      border: 1px solid rgba(220,20,60,0.20);
      background: rgba(16, 12, 24, 0.84);
      box-shadow: 0 20px 48px rgba(0,0,0,0.28), 0 0 28px rgba(220,20,60,0.10);
    }

    .brand {
      margin-bottom: 8px;
      text-align: center;
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--red1), var(--red2), var(--red3), var(--red2), var(--red1));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: 1.4rem;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
      text-align: center;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }
    .captcha-box {
      margin: 10px 0 4px;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      display: grid;
      gap: 10px;
      justify-items: center;
    }
    .captcha-title {
      color: var(--white);
      font-size: 0.98rem;
      width: 100%;
    }
    .captcha-copy {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
      width: 100%;
    }
    .captcha-slot {
      width: 100%;
      min-height: 78px;
      display: grid;
      place-items: center;
    }
    .captcha-note {
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
      line-height: 1.4;
    }

    label {
      color: var(--muted);
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #fff;
      font: inherit;
      outline: none;
    }

    .primary,
    .secondary {
      width: 100%;
      padding: 14px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.14s ease, opacity 0.14s ease;
    }

    .primary {
      margin-top: 6px;
      background: linear-gradient(180deg, rgba(90, 10, 18, 0.94), rgba(116, 14, 28, 0.94));
      color: #fff;
      border-color: rgba(220,20,60,0.42);
    }

    .secondary {
      margin-top: 10px;
      background: rgba(255,255,255,0.04);
      color: var(--white);
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }

    .primary:hover,
    .secondary:hover {
      transform: translateY(-1px);
      opacity: 0.92;
    }
    .divider {
      margin: 14px 0 10px;
      text-align: center;
      color: var(--muted);
      font-size: 0.86rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status {
      min-height: 24px;
      margin-top: 14px;
      text-align: center;
      color: var(--muted);
    }

    .status.good { color: var(--good); }
    .status.bad { color: var(--red3); }
  </style>
</head>
<body>
  <main class="shell">
    <div class="brand">NOCTIVE</div>
    <h1>Sign Up</h1>
    <p>Create your account to enter the private garden.</p>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="you@example.com" />
    </div>

    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" autocomplete="username" placeholder="pick a username" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="new-password" placeholder="Choose a password" />
    </div>

    <div class="captcha-box">
      <div class="captcha-title">Are you human?</div>
      <div class="captcha-copy">Complete the captcha challenge before creating your account.</div>
      <div class="captcha-slot">
        <div id="recaptchaMount"></div>
      </div>
      <div class="captcha-note" id="captchaNote">Paste your Google reCAPTCHA v2 site key in this file to activate the real widget.</div>
    </div>

    <button class="primary" id="signUpActionBtn" type="button">Create Account</button>
    <div class="divider">or</div>
    <button class="secondary" id="googleSignUpBtn" type="button">Continue with Google</button>
    <a class="secondary" href="../index.html">Back to the gate</a>
    <div class="status" id="status" aria-live="polite"></div>
  </main>

  <script>
    window.NOCTIVE_RECAPTCHA_SITE_KEY = "6LcnhpssAAAAACQKa5dFboUcMxlJfaTAeR3fZWMV";
    window.noctiveRecaptchaReady = false;
    window.noctiveRecaptchaOnload = () => {
      window.noctiveRecaptchaReady = true;
      window.dispatchEvent(new CustomEvent("noctive-recaptcha-ready"));
    };
  </script>
  <script src="https://www.google.com/recaptcha/api.js?onload=noctiveRecaptchaOnload&render=explicit" async defer></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      createUserWithEmailAndPassword,
      deleteUser,
      getAdditionalUserInfo,
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      doc,
      getFirestore,
      runTransaction,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const ACCESS_SESSION_KEY = "noctive_site_access";
    const GOOGLE_SIGNUP_PENDING_KEY = "noctive_google_signup_pending";
    const OWNER_UIDS = ["TljwjuBuKvd6VG9e0Mz81y7ZRgi1"];
    const RESERVED_USERNAMES = [
      "noctive",
      "noctivehq",
      "noctiveofficial",
      "noctivestaff",
      "noctiveadmin",
      "venus"
    ];
    const firebaseConfig = {
      apiKey: "AIzaSyCUHWXemBpfAWOSDqj1_rY6s4oQr27FnKg",
      authDomain: "noctive-41c22.firebaseapp.com",
      projectId: "noctive-41c22",
      storageBucket: "noctive-41c22.firebasestorage.app",
      messagingSenderId: "617642134193",
      appId: "1:617642134193:web:ea5f0c93e56c654f66f090",
      measurementId: "G-8ZFW3MTB3C"
    };

    const emailInput = document.getElementById("email");
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const captchaNote = document.getElementById("captchaNote");
    const signUpActionBtn = document.getElementById("signUpActionBtn");
    const googleSignUpBtn = document.getElementById("googleSignUpBtn");
    const status = document.getElementById("status");
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    let recaptchaWidgetId = null;
    let recaptchaRetryCount = 0;
    const blockedUsernameTerms = [
      "admin",
      "administrator",
      "mod",
      "moderator",
      "owner",
      "support",
      "staff",
      "official",
      "fuck",
      "shit",
      "bitch",
      "asshole",
      "slut",
      "whore",
      "nigger",
      "nigga",
      "fag",
      "faggot",
      "kike",
      "tranny",
      "rape",
      "rapist",
      "kill",
      "suicide",
      "naz",
      "hitler"
    ];

    function getCaptchaToken() {
      if (!window.grecaptcha || recaptchaWidgetId === null) return "";
      return window.grecaptcha.getResponse(recaptchaWidgetId);
    }

    function resetCaptcha() {
      if (window.grecaptcha && recaptchaWidgetId !== null) {
        window.grecaptcha.reset(recaptchaWidgetId);
      }
    }

    function loadRecaptcha() {
      const siteKey = window.NOCTIVE_RECAPTCHA_SITE_KEY;
      const mount = document.getElementById("recaptchaMount");

      if (!mount) return;

      if (!siteKey || siteKey === "PASTE_RECAPTCHA_V2_SITE_KEY_HERE") {
        if (captchaNote) {
          captchaNote.textContent = "reCAPTCHA is waiting for your real Google site key.";
        }
        return;
      }

      if (recaptchaWidgetId !== null) return;

      if (!window.grecaptcha || !window.noctiveRecaptchaReady) {
        recaptchaRetryCount += 1;
        if (captchaNote) {
          captchaNote.textContent = "Loading captcha...";
        }
        if (recaptchaRetryCount <= 20) {
          window.setTimeout(loadRecaptcha, 300);
        } else if (captchaNote) {
          captchaNote.textContent = "Captcha could not load yet. Refresh and try again.";
        }
        return;
      }

      recaptchaWidgetId = window.grecaptcha.render(mount, {
        sitekey: siteKey,
        theme: "dark"
      });

      if (captchaNote) {
        captchaNote.textContent = "Captcha ready.";
      }
    }

    function setStatus(message, kind = "") {
      status.textContent = message;
      status.className = `status ${kind}`.trim();
    }

    function normalizeUsername(value) {
      return String(value || "")
        .trim()
        .replace(/\s+/g, "")
        .replace(/[^a-zA-Z0-9._-]/g, "")
        .toLowerCase();
    }

    function validateUsername(username) {
      if (!username) {
        return "Username is required.";
      }

      if (username.length < 3) {
        return "Username must be at least 3 characters.";
      }

      if (username.length > 20) {
        return "Username must be 20 characters or fewer.";
      }

      if (!/^[a-z0-9._-]+$/.test(username)) {
        return "Username can only use letters, numbers, dots, dashes, or underscores.";
      }

      if (/^[._-]/.test(username) || /[._-]$/.test(username)) {
        return "Username cannot start or end with punctuation.";
      }

      if (/[._-]{2,}/.test(username)) {
        return "Username cannot stack punctuation like .. or __.";
      }

      const blockedTerm = blockedUsernameTerms.find((term) => username.includes(term));
      if (blockedTerm) {
        return "Please choose a different username.";
      }

      return "";
    }

    function validatePassword(password, username, email) {
      if (!password) {
        return "Password is required.";
      }

      if (password.length < 10) {
        return "Password must be at least 10 characters.";
      }

      if (!/[A-Z]/.test(password)) {
        return "Password needs at least one uppercase letter.";
      }

      if (!/[a-z]/.test(password)) {
        return "Password needs at least one lowercase letter.";
      }

      if (!/\d/.test(password)) {
        return "Password needs at least one number.";
      }

      if (!/[^A-Za-z0-9]/.test(password)) {
        return "Password needs at least one symbol.";
      }

      const loweredPassword = password.toLowerCase();
      const loweredEmail = String(email || "").toLowerCase();
      const loweredUsername = String(username || "").toLowerCase();
      const weakTerms = ["password", "123456", "qwerty", "letmein", "welcome", "noctive"];

      if (loweredUsername && loweredPassword.includes(loweredUsername)) {
        return "Password should not include your username.";
      }

      if (loweredEmail && loweredPassword.includes(loweredEmail)) {
        return "Password should not include your email.";
      }

      if (weakTerms.some((term) => loweredPassword.includes(term))) {
        return "Password is too easy to guess. Make it more unique.";
      }

      return "";
    }

    function isOwnerUid(uid) {
      return OWNER_UIDS.includes(String(uid || "").trim());
    }

    function isReservedUsername(username) {
      return RESERVED_USERNAMES.includes(String(username || "").trim().toLowerCase());
    }

    async function reserveUsername(user, username, email, authMethod) {
      const usernameRef = doc(db, "Usernames", username);
      const profileRef = doc(db, "Profiles", user.uid);

      await runTransaction(db, async (transaction) => {
        if (isReservedUsername(username) && !isOwnerUid(user.uid)) {
          throw new Error("That username is reserved.");
        }

        const usernameDoc = await transaction.get(usernameRef);

        if (usernameDoc.exists()) {
          throw new Error("That username is already taken.");
        }

        transaction.set(usernameRef, {
          uid: user.uid,
          username,
          authMethod,
          createdAt: serverTimestamp()
        });

        transaction.set(profileRef, {
          uid: user.uid,
          username,
          displayName: username,
          email,
          authMethod,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        }, { merge: true });
      });
    }

    function saveLocalProfile(user, username) {
      if (!user?.uid || !username) return;

      const profileKey = `noctive_profile_${user.uid}`;

      try {
        const raw = localStorage.getItem(profileKey);
        const currentProfile = raw ? JSON.parse(raw) : {};
        const nextProfile = {
          ...currentProfile,
          username,
          displayName: currentProfile.displayName || username
        };
        localStorage.setItem(profileKey, JSON.stringify(nextProfile));
      } catch (error) {
        console.error("Could not save signup profile locally:", error);
      }
    }

    window.addEventListener("noctive-recaptcha-ready", loadRecaptcha);
    loadRecaptcha();

    signUpActionBtn?.addEventListener("click", async () => {
      const email = emailInput.value.trim();
      const username = normalizeUsername(usernameInput.value);
      const password = passwordInput.value;

      if (!email || !username || !password) {
        setStatus("Email, username, and password are required.", "bad");
        return;
      }

      const usernameError = validateUsername(username);
      if (usernameError) {
        setStatus(usernameError, "bad");
        return;
      }

      const passwordError = validatePassword(password, username, email);
      if (passwordError) {
        setStatus(passwordError, "bad");
        return;
      }

      if (!getCaptchaToken()) {
        setStatus("Please complete the captcha first.", "bad");
        return;
      }

      signUpActionBtn.disabled = true;
      setStatus("Creating your account...", "");
      let createdUser = null;

      try {
        const result = await createUserWithEmailAndPassword(auth, email, password);
        createdUser = result.user;
        await updateProfile(result.user, { displayName: username });
        await reserveUsername(result.user, username, email, "password");
        saveLocalProfile(result.user, username);
        sessionStorage.setItem(ACCESS_SESSION_KEY, "granted");
        setStatus("Account created. Entering Noctive...", "good");
        window.setTimeout(() => {
          window.location.replace("./home.html");
        }, 500);
      } catch (error) {
        console.error(error);
        if (createdUser?.uid) {
          try {
            await deleteUser(createdUser);
          } catch (cleanupError) {
            console.error("Could not clean up incomplete account:", cleanupError);
          }
        }
        setStatus(error?.message || "Could not create account.", "bad");
        resetCaptcha();
        signUpActionBtn.disabled = false;
      }
    });

    googleSignUpBtn?.addEventListener("click", async () => {
      if (!getCaptchaToken()) {
        setStatus("Please complete the captcha first.", "bad");
        return;
      }

      googleSignUpBtn.disabled = true;
      setStatus("Opening Google...", "");
      let popupUser = null;
      let popupCreatedNewUser = false;

      try {
        const result = await signInWithPopup(auth, provider);
        popupUser = result.user;
        popupCreatedNewUser = Boolean(getAdditionalUserInfo(result)?.isNewUser);

        if (!popupCreatedNewUser) {
          await signOut(auth);
          sessionStorage.removeItem(ACCESS_SESSION_KEY);
          setStatus("That Google account already has a Noctive login. Use Google login instead.", "bad");
          googleSignUpBtn.disabled = false;
          return;
        }

        sessionStorage.setItem(GOOGLE_SIGNUP_PENDING_KEY, "google");
        setStatus("Google accepted. One last setup step...", "good");
        window.setTimeout(() => {
          window.location.replace("./welcome.html");
        }, 400);
      } catch (error) {
        console.error(error);
        if (popupCreatedNewUser && popupUser?.uid) {
          try {
            await deleteUser(popupUser);
          } catch (cleanupError) {
            console.error("Could not clean up incomplete Google signup:", cleanupError);
          }
        }
        setStatus(error?.message || "Google sign-up failed.", "bad");
        resetCaptcha();
        googleSignUpBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
