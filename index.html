<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="pngs/Favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noctive | Private Garden</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0911;
            --panel: rgba(18, 14, 28, 0.9);
            --panel-soft: rgba(255, 255, 255, 0.04);
            --line: rgba(255, 255, 255, 0.26);
            --line-strong: rgba(255, 255, 255, 0.42);
            --text: rgba(255, 255, 255, 0.96);
            --muted: rgba(255, 255, 255, 0.72);
            --muted-soft: rgba(255, 255, 255, 0.54);
            --gold: #f1c75d;
            --red-core: #dc143c;
            --red-deep: #7a1028;
            --violet-core: #5c2c9d;
            --violet-deep: #221135;
            --good: #79e0aa;
            --bad: #ff7d84;
        }

        * { box-sizing: border-box; }

        html, body {
            min-height: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(900px 600px at 18% 16%, rgba(220, 20, 60, 0.24), transparent 58%),
                radial-gradient(820px 580px at 84% 18%, rgba(92, 44, 157, 0.26), transparent 56%),
                radial-gradient(880px 620px at 50% 112%, rgba(122, 16, 40, 0.28), transparent 58%),
                linear-gradient(180deg, rgba(255,255,255,0.02), transparent 28%),
                var(--bg);
            color: var(--text);
            font-family: 'Rubik', system-ui, sans-serif;
        }

        .shell {
            width: min(100%, 440px);
        }

        .gate-card {
            position: relative;
            display: grid;
            justify-items: center;
            gap: 18px;
            padding: 34px 30px 30px;
            border-radius: 34px;
            background:
                radial-gradient(120% 150% at 10% 0%, rgba(220, 20, 60, 0.1), transparent 50%),
                radial-gradient(120% 140% at 100% 0%, rgba(92, 44, 157, 0.12), transparent 54%),
                linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015)),
                var(--panel);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow:
                0 24px 60px rgba(0,0,0,0.5),
                0 0 50px rgba(220, 20, 60, 0.08),
                0 0 70px rgba(92, 44, 157, 0.08),
                0 0 0 1px rgba(255,255,255,0.02) inset;
            overflow: hidden;
        }

        .gate-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 38%);
            pointer-events: none;
        }

        .brand-mark {
            font-size: 0.8rem;
            letter-spacing: 0.34em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.38);
        }

        .headline {
            margin: 0;
            font-size: clamp(2rem, 6vw, 2.45rem);
            line-height: 0.98;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            text-align: center;
            font-weight: 700;
        }

        .sub {
            margin: 0;
            color: var(--muted);
            font-size: 1.02rem;
            text-align: center;
            line-height: 1.45;
        }

        .key-icon {
            width: 42px;
            height: 42px;
            color: var(--gold);
            filter: drop-shadow(0 0 10px rgba(241, 199, 93, 0.22));
        }

        .primary-actions,
        .alt-access-menu,
        .code-panel {
            width: 100%;
        }

        .primary-actions {
            display: grid;
            gap: 14px;
        }

        .access-button,
        .alt-access-toggle {
            width: 100%;
            min-height: 58px;
            border-radius: 999px;
            border: 1.5px solid var(--line);
            background: rgba(255,255,255,0.015);
            color: var(--text);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 0 22px;
            font-size: 0.98rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
            cursor: pointer;
        }

        .access-button:hover,
        .alt-access-toggle:hover,
        .access-button:focus-visible,
        .alt-access-toggle:focus-visible {
            transform: translateY(-1px);
            border-color: rgba(220, 20, 60, 0.72);
            background: rgba(220, 20, 60, 0.08);
            box-shadow:
                0 0 0 4px rgba(220, 20, 60, 0.08),
                0 0 22px rgba(220, 20, 60, 0.28);
            outline: none;
        }

        .access-button svg,
        .alt-access-link svg {
            width: 22px;
            height: 22px;
            flex: 0 0 auto;
        }

        .alt-access {
            display: grid;
            justify-items: center;
            gap: 12px;
        }

        .alt-access-toggle {
            width: auto;
            min-height: 34px;
            min-width: 62px;
            padding: 0 18px 4px;
            background: transparent;
            color: rgba(255,255,255,0.74);
            letter-spacing: 0.26em;
        }

        .alt-access-menu {
            display: grid;
            gap: 12px;
            animation: riseIn 0.18s ease;
        }

        .alt-access-menu[hidden],
        .code-panel[hidden] {
            display: none !important;
        }

        .alt-access-link {
            width: 100%;
            min-height: 58px;
            border-radius: 999px;
            border: 1.5px solid var(--line);
            background: rgba(255,255,255,0.015);
            color: var(--text);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 0 22px;
            font-size: 0.98rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
        }

        .alt-access-link:hover,
        .alt-access-link:focus-visible {
            transform: translateY(-1px);
            border-color: rgba(220, 20, 60, 0.72);
            background: rgba(220, 20, 60, 0.08);
            box-shadow:
                0 0 0 4px rgba(220, 20, 60, 0.08),
                0 0 22px rgba(220, 20, 60, 0.28);
            outline: none;
        }

        .code-panel {
            margin-top: 4px;
            padding: 18px 18px 16px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.09);
            background: rgba(255,255,255,0.03);
            box-shadow: 0 18px 30px rgba(0,0,0,0.18);
            animation: riseIn 0.18s ease;
        }

        .code-copy {
            margin: 0 0 14px;
            text-align: center;
            color: var(--muted-soft);
            font-size: 0.84rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .code-pill {
            padding: 15px 14px;
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,0.09);
            background: rgba(0,0,0,0.18);
        }

        .code-inputs {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px !important;
        }

        .code-inputs > div {
            display: flex;
            gap: 3px;
        }

        .code-inputs span {
            margin: 0 5px;
            color: rgba(255,255,255,0.34);
        }

        input.code-char {
            width: 1.15em;
            height: 1.6em;
            margin: 0;
            padding: 0;
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.24);
            background: transparent;
            color: var(--text);
            text-align: center;
            font-family: 'Rubik', system-ui, sans-serif;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            outline: none;
            transition: border-color 0.16s ease, transform 0.16s ease;
        }

        input.code-char:focus {
            border-bottom-color: var(--gold);
            transform: translateY(-1px);
        }

        .code-actions {
            display: grid;
            gap: 10px;
            margin-top: 14px;
        }

        .unlock-btn {
            min-height: 52px;
            border-radius: 999px;
            border: 1px solid rgba(241, 199, 93, 0.32);
            background: linear-gradient(180deg, rgba(241, 199, 93, 0.17), rgba(241, 199, 93, 0.08));
            color: var(--text);
            font: inherit;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
        }

        .unlock-btn:hover,
        .unlock-btn:focus-visible {
            transform: translateY(-1px);
            border-color: rgba(220, 20, 60, 0.72);
            background: linear-gradient(180deg, rgba(220, 20, 60, 0.2), rgba(122, 16, 40, 0.12));
            box-shadow:
                0 0 0 4px rgba(220, 20, 60, 0.08),
                0 0 22px rgba(220, 20, 60, 0.28);
            outline: none;
        }

        .status {
            margin-top: 0;
            text-align: center;
            font-size: 0.86rem;
            color: var(--muted-soft);
        }

        .status:empty {
            display: none;
        }

        .status:not(:empty) {
            min-height: 18px;
            margin-top: 6px;
        }

        .status.good { color: var(--good); }
        .status.bad { color: var(--bad); }
        .status.remind { color: var(--gold); }

        .about-link {
            margin-top: 2px;
            color: rgba(255,255,255,0.45);
            text-decoration: none;
            font-size: 0.82rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            transition: color 0.16s ease;
        }

        .about-link:hover,
        .about-link:focus-visible {
            color: rgba(255,255,255,0.82);
            outline: none;
        }

        .shake { animation: shake 0.35s ease-in-out; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 520px) {
            body {
                padding: 16px;
            }

            .gate-card {
                border-radius: 28px;
                padding: 28px 18px 24px;
            }

            .headline {
                font-size: 1.8rem;
            }

            .access-button,
            .alt-access-link,
            .alt-access-toggle {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="gate-card">
            <div class="brand-mark">Noctive</div>
            <h1 class="headline">Private Garden</h1>
            <p class="sub">This is a private club.</p>

            <svg class="key-icon" viewBox="0 0 48 48" fill="none" aria-hidden="true">
                <circle cx="15" cy="24" r="7" stroke="currentColor" stroke-width="4"></circle>
                <path d="M22 24H38M34 24V18M30 24V30" stroke="currentColor" stroke-width="4" stroke-linecap="round"></path>
            </svg>

            <div class="primary-actions">
                <a class="access-button" href="./pages/login-google.html" id="loginGoogleBtn">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="#EA4335" d="M12 10.2v3.9h5.4c-.2 1.3-1.5 3.9-5.4 3.9-3.2 0-5.9-2.7-5.9-6s2.7-6 5.9-6c1.8 0 3 .8 3.7 1.5l2.5-2.4C16.6 3.5 14.5 2.6 12 2.6 6.8 2.6 2.6 6.8 2.6 12s4.2 9.4 9.4 9.4c5.4 0 9-3.8 9-9.1 0-.6-.1-1.1-.2-1.6H12Z"></path>
                        <path fill="#34A853" d="M2.6 12c0 1.7.4 3.3 1.2 4.7l3.9-3c-.2-.5-.3-1.1-.3-1.7s.1-1.2.3-1.7l-3.9-3C3 8.7 2.6 10.3 2.6 12Z"></path>
                        <path fill="#FBBC05" d="M12 21.4c2.5 0 4.6-.8 6.1-2.2l-3-2.3c-.8.6-1.8.9-3.1.9-2.5 0-4.6-1.7-5.4-4l-4 3.1c1.6 3.1 4.8 5.5 9.4 5.5Z"></path>
                        <path fill="#4285F4" d="M21 12.3c0-.7-.1-1.3-.2-1.9H12v3.9h5.1c-.2 1.1-.9 2-1.9 2.7l3 2.3c1.8-1.7 2.8-4.1 2.8-7Z"></path>
                    </svg>
                    <span>Login With Google</span>
                </a>

                <div class="alt-access">
                    <button
                        class="alt-access-toggle"
                        id="altAccessToggle"
                        type="button"
                        aria-label="More login options"
                        aria-expanded="false"
                        aria-controls="altAccessMenu"
                    >...</button>

                    <div class="alt-access-menu" id="altAccessMenu" hidden>
                        <a class="alt-access-link" href="./pages/signup.html" id="signUpBtn">
                            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                            </svg>
                            <span>Sign Up</span>
                        </a>

                        <button class="alt-access-link" type="button" id="toggleCodeBtn" aria-expanded="false" aria-controls="codePanel">
                            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M4 8h16M4 16h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
                                <path d="M7 12h2M11 12h2M15 12h2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"></path>
                            </svg>
                            <span>Type Code To Open</span>
                        </button>

                        <a class="alt-access-link" href="./pages/login-email.html" id="loginEmailBtn">
                            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M4 7h16v10H4z" stroke="currentColor" stroke-width="1.8"></path>
                                <path d="M4 8l8 6 8-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                            <span>Login With Email</span>
                        </a>
                    </div>
                </div>
            </div>

            <form class="code-panel" id="unlockForm" hidden>
                <p class="code-copy">Type the private key exactly.</p>
                <div class="code-pill" id="pill">
                    <div id="codeInputs" class="code-inputs">
                        <div>
                            <input maxlength="1" class="code-char" type="text" inputmode="text" pattern="[A-Z0-9]" />
                            <input maxlength="1" class="code-char" type="text" inputmode="text" pattern="[A-Z0-9]" />
                            <input maxlength="1" class="code-char" type="text" inputmode="text" pattern="[A-Z0-9]" />
                            <input maxlength="1" class="code-char" type="text" inputmode="text" pattern="[A-Z0-9]" />
                            <input maxlength="1" class="code-char" type="text" inputmode="text" pattern="[A-Z0-9]" />
                        </div>
                        <span>-</span>
                        <div>
                            <input maxlength="1" class="code-char" type="text" inputmode="text" pattern="[A-Z0-9]" />
                            <input maxlength="1" class="code-char" type="text" inputmode="text" pattern="[A-Z0-9]" />
                            <input maxlength="1" class="code-char" type="text" inputmode="text" pattern="[A-Z0-9]" />
                            <input maxlength="1" class="code-char" type="text" inputmode="text" pattern="[A-Z0-9]" />
                        </div>
                        <span>-</span>
                        <div>
                            <input maxlength="1" class="code-char" type="text" inputmode="text" pattern="[A-Z0-9]" />
                            <input maxlength="1" class="code-char" type="text" inputmode="text" pattern="[A-Z0-9]" />
                            <input maxlength="1" class="code-char" type="text" inputmode="text" pattern="[A-Z0-9]" />
                            <input maxlength="1" class="code-char" type="text" inputmode="text" pattern="[A-Z0-9]" />
                        </div>
                    </div>
                </div>
                <div class="code-actions">
                    <button class="unlock-btn" id="unlockBtn" type="submit">Enter With Your Key</button>
                </div>
            </form>

            <div class="status" id="status"></div>
            <a class="about-link" href="https://github.com/PivotMenace/Noctive" target="_blank" rel="noopener noreferrer">You're not Venus</a>
        </section>
    </main>

    <script>
        const VALID_KEY = "CIVET-908N-227O";
        const ACCESS_SESSION_KEY = "noctive_site_access";

        const pill = document.getElementById("pill");
        const status = document.getElementById("status");
        const unlockForm = document.getElementById("unlockForm");
        const codeInputs = document.querySelectorAll("#codeInputs input.code-char");
        const altAccessToggle = document.getElementById("altAccessToggle");
        const altAccessMenu = document.getElementById("altAccessMenu");
        const toggleCodeBtn = document.getElementById("toggleCodeBtn");

        function normalize(v) {
            return (v || "").trim().toUpperCase().replace(/\s+/g, "");
        }

        function setStatus(text, kind) {
            status.textContent = text || "";
            status.classList.remove("good", "bad", "remind");
            if (kind) status.classList.add(kind);
        }

        function closeAltAccessMenu() {
            altAccessMenu?.setAttribute("hidden", "hidden");
            altAccessToggle?.setAttribute("aria-expanded", "false");
        }

        function collapseAccessPanels() {
            closeAltAccessMenu();
            showCodePanel(false);
        }

        function showCodePanel(forceOpen) {
            const shouldOpen = typeof forceOpen === "boolean"
                ? forceOpen
                : unlockForm.hasAttribute("hidden");

            if (shouldOpen) {
                unlockForm.removeAttribute("hidden");
                toggleCodeBtn?.setAttribute("aria-expanded", "true");
                setStatus("", "");
                window.setTimeout(() => codeInputs[0]?.focus(), 40);
            } else {
                unlockForm.setAttribute("hidden", "hidden");
                toggleCodeBtn?.setAttribute("aria-expanded", "false");
            }
        }

        function shake() {
            pill.classList.remove("shake");
            void pill.offsetWidth;
            pill.classList.add("shake");
        }

        function getCodeFromInputs() {
            let code = "";
            codeInputs.forEach((input, idx) => {
                code += (input.value || "").toUpperCase();
                if (idx === 4 || idx === 8) code += "-";
            });
            return code.replace(/-$/, "");
        }

        if (sessionStorage.getItem(ACCESS_SESSION_KEY) === "granted") {
            window.location.replace("./pages/home.html");
        }

        function tryUnlock() {
            if (document.activeElement instanceof HTMLElement) {
                document.activeElement.blur();
            }

            const entered = getCodeFromInputs();
            if (!entered || entered.length < 15) {
                setStatus("Type your key.", "bad");
                showCodePanel(true);
                shake();
                return;
            }
            if (normalize(entered) === normalize(VALID_KEY)) {
                setStatus("Access granted.", "good");
                sessionStorage.setItem(ACCESS_SESSION_KEY, "granted");
                setTimeout(() => {
                    window.location.replace("./pages/home.html");
                }, 900);
            } else {
                setStatus("Invalid key.", "bad");
                showCodePanel(true);
                shake();
            }
        }

        unlockForm.addEventListener("submit", (e) => {
            e.preventDefault();
            tryUnlock();
        });

        altAccessToggle?.addEventListener("click", () => {
            const isHidden = altAccessMenu?.hasAttribute("hidden");
            if (isHidden) {
                altAccessMenu?.removeAttribute("hidden");
                altAccessToggle.setAttribute("aria-expanded", "true");
            } else {
                collapseAccessPanels();
            }
        });

        toggleCodeBtn?.addEventListener("click", () => {
            showCodePanel();
            closeAltAccessMenu();
        });

        document.addEventListener("click", (event) => {
            if (!altAccessMenu || !altAccessToggle) return;
            if (altAccessMenu.hasAttribute("hidden")) return;
            if (altAccessMenu.contains(event.target) || altAccessToggle.contains(event.target)) return;
            collapseAccessPanels();
        });

        codeInputs.forEach((input, idx) => {
            input.addEventListener("input", () => {
                let val = input.value.toUpperCase().replace(/[^A-Z0-9]/g, "");
                input.value = val;
                setStatus("", "");
                if (val && idx < codeInputs.length - 1) {
                    codeInputs[idx + 1].focus();
                }
            });
            input.addEventListener("keydown", (e) => {
                if (e.key === "Backspace" && !input.value && idx > 0) {
                    codeInputs[idx - 1].focus();
                } else if (e.key === "ArrowLeft" && idx > 0) {
                    codeInputs[idx - 1].focus();
                } else if (e.key === "ArrowRight" && idx < codeInputs.length - 1) {
                    codeInputs[idx + 1].focus();
                } else if (e.key === "Enter") {
                    tryUnlock();
                }
            });
        });
    </script>
</body>
</html>
